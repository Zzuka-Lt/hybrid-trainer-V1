<style>

    --bg: #FAFBFC; --text: #2C3E50; --muted: #95A5A6; --light: #BDC3C7;

    --orange: #F39C12; --blue: #2980B9;
  }

  body {
    font-family: 'DM Sans', 'Helvetica Neue', sans-serif;
    background: var(--bg); color: var(--text);
    max-width: 520px; margin: 0 auto;
    padding: env(safe-area-inset-top) 0 calc(env(safe-area-inset-bottom) + 20px);
    min-height: 100vh; min-height: 100dvh;
  }
  button { font-family: inherit; }

  .header { padding: 24px 20px 18px; color: #fff; position: relative; overflow: hidden; }
  .header-circle { position: absolute; top: -30px; right: -30px; width: 120px; height: 120px; border-radius: 50%; background: rgba(255,255,255,0.07); }
  .header-top { display: flex; justify-content: space-between; align-items: flex-start; }
  .header-label { font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: 2px; opacity: 0.65; }
  .header-title { font-family: 'JetBrains Mono', monospace; font-size: 21px; font-weight: 700; margin-top: 5px; }
  .header-desc { font-size: 12px; opacity: 0.8; margin-top: 8px; line-height: 1.4; }
  .countdown { text-align: right; background: rgba(255,255,255,0.15); border-radius: 10px; padding: 8px 12px; }
  .countdown-num { font-family: 'JetBrains Mono', monospace; font-size: 20px; font-weight: 700; }
  .countdown-sub { font-size: 9px; opacity: 0.8; margin-top: 1px; }

  .progress-bar { height: 4px; background: rgba(255,255,255,0.2); border-radius: 2px; margin-top: 12px; }
  .progress-fill { height: 100%; background: #fff; border-radius: 2px; transition: width 0.4s; }
  .progress-label { display: flex; justify-content: space-between; font-size: 9px; opacity: 0.6; margin-bottom: 3px; }

  .week-nav { padding: 12px 16px 0; display: flex; align-items: center; justify-content: space-between; }
  .week-btn { width: 34px; height: 34px; border-radius: 9px; border: 1px solid #E0E0E0; background: #fff; font-size: 15px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
  .week-btn:disabled { opacity: 0.3; cursor: default; }
  .week-title { font-family: 'JetBrains Mono', monospace; font-size: 17px; font-weight: 700; }
  .week-date { font-size: 11px; color: var(--muted); margin-top: 1px; }
  .week-count { font-size: 10px; color: var(--light); margin-top: 1px; }

  .week-bar { padding: 6px 16px 0; }
  .week-bar-track { height: 5px; background: #ECF0F1; border-radius: 3px; }
  .week-bar-fill { height: 100%; border-radius: 3px; transition: width 0.3s; }

  .phase-pills { display: flex; gap: 4px; padding: 8px 16px; overflow-x: auto; -webkit-overflow-scrolling: touch; }
  .phase-pill { padding: 4px 10px; border-radius: 14px; border: none; font-size: 10px; font-weight: 600; cursor: pointer; white-space: nowrap; }

  .sessions { padding: 0 16px; }
  .day-label { font-size: 10px; font-weight: 700; color: #B0B0B0; letter-spacing: 1px; padding: 6px 0 3px; display: flex; align-items: center; gap: 6px; text-transform: uppercase; }
  .double-badge { background: var(--orange); color: #fff; font-size: 8px; padding: 1px 6px; border-radius: 8px; }
  .day-group { display: flex; flex-direction: column; gap: 5px; margin-bottom: 4px; }

  .card { border-radius: 12px; overflow: hidden; transition: all 0.2s; }
  .card.done { background: #F0FFF4 !important; border-color: var(--green) !important; }
  .card.skipped { opacity: 0.35; }
  .card-rescheduled { background: var(--orange); color: #fff; font-size: 9px; font-weight: 700; letter-spacing: 1px; padding: 2px 0; text-align: center; text-transform: uppercase; }

  .card-main { padding: 11px 13px; display: flex; align-items: center; gap: 10px; cursor: pointer; }
  .checkbox { width: 26px; height: 26px; border-radius: 7px; border: 2px solid #D5D8DC; background: #fff; display: flex; align-items: center; justify-content: center; flex-shrink: 0; cursor: pointer; transition: all 0.15s; }
  .checkbox.checked { background: var(--green); border-color: var(--green); }
  .checkbox-mark { color: #fff; font-size: 14px; font-weight: 700; }

  .card-info { flex: 1; }
  .card-meta { display: flex; align-items: center; gap: 5px; flex-wrap: wrap; }
  .card-day { font-size: 10px; color: var(--muted); font-weight: 600; min-width: 26px; }
  .card-slot { font-size: 11px; }
  .card-tag { font-size: 8px; font-weight: 700; letter-spacing: 0.5px; padding: 2px 6px; border-radius: 4px; }
  .card-label { font-size: 14px; font-weight: 600; margin-top: 2px; }
  .card-label.strike { text-decoration: line-through; color: var(--light); }
  .card-dur { font-size: 11px; font-weight: 700; padding: 3px 9px; border-radius: 14px; }

  .card-detail { padding: 0 13px 13px; border-top: 1px solid rgba(0,0,0,0.04); }
  .card-detail p { font-size: 13px; color: #5D6D7E; line-height: 1.6; margin: 10px 0; }

  .ex-list { display: flex; flex-direction: column; gap: 5px; margin-top: 8px; }
  .ex-item { display: flex; justify-content: space-between; padding: 9px 11px; background: rgba(255,255,255,0.7); border-radius: 8px; gap: 8px; }
  .ex-name { font-weight: 600; font-size: 13px; }
  .ex-notes { font-size: 11px; color: #7F8C8D; margin-top: 2px; line-height: 1.4; }
  .ex-sets { font-family: 'JetBrains Mono', monospace; font-size: 13px; font-weight: 700; }
  .ex-rest { font-size: 10px; color: var(--muted); margin-top: 1px; }
  .ex-footer { font-size: 10px; color: #B0B0B0; text-align: right; margin-top: 2px; }

  .actions { margin-top: 12px; display: flex; gap: 8px; }
  .btn-done { flex: 1; padding: 10px; background: var(--green); color: #fff; border: none; border-radius: 10px; font-weight: 700; font-size: 13px; cursor: pointer; }
  .btn-skip { padding: 10px 12px; background: #ECF0F1; color: #7F8C8D; border: none; border-radius: 10px; font-weight: 600; font-size: 12px; cursor: pointer; }
  .btn-confirm { padding: 10px 12px; background: var(--red); color: #fff; border: none; border-radius: 10px; font-weight: 600; font-size: 12px; cursor: pointer; }

  .tip { margin: 12px 16px 0; padding: 10px 13px; border-radius: 0 10px 10px 0; font-size: 12px; color: #5D6D7E; line-height: 1.5; }

  .prep-card { border-radius: 12px; padding: 14px 16px; background: repeating-linear-gradient(135deg, #F0F0F0, #F0F0F0 10px, #F7F7F7 10px, #F7F7F7 20px); border: 1.5px dashed #D0D0D0; opacity: 0.7; }
  .prep-card .card-label { color: var(--muted); }

  .footer { text-align: center; font-size: 10px; color: var(--light); margin-top: 16px; padding: 0 20px; line-height: 1.5; }
  .save-row { display: flex; justify-content: center; align-items: center; gap: 12px; margin-top: 12px; }
  .save-dot { width: 6px; height: 6px; border-radius: 50%; display: inline-block; }
  .btn-reset { font-size: 10px; color: var(--red); background: none; border: 1px solid rgba(231,76,60,0.2); border-radius: 8px; padding: 3px 10px; cursor: pointer; }

  .loading { display: flex; align-items: center; justify-content: center; min-height: 100vh; min-height: 100dvh; color: var(--muted); font-size: 14px; }

      { day: "Ven", slot: "repos", type: "rest", label: "Repos", detail: "Prépare sac, dossard, nutrition.", dur: 0 },
      { day: "Sam", slot: "repos", type: "rest", label: "Veille de course", detail: "Marche 15min. Pâtes le soir. Couché tôt.", dur: 0 },
      { day: "Dim", slot: "matin", type: "race", label: "🏁 SEMI-MARATHON", detail: "27 SEPT. Échauff 10min. Km 1-5: 5:50. Km 5-15: 5:40. Km 15-21: accélère si OK. Ravito tous les 5km.", dur: 120 },
    ],
  },
];

/* ═══════════════ STATE ═══════════════ */
function buildWeeks() {
  const weeks = [];
  let wn = 1;
  PHASES.forEach((ph, pi) => {
    for (let w = 0; w < ph.nWeeks; w++) {
      const ws = addDays(W1MON, (wn - 1) * 7);
      const tpl = (pi === 0 && w === 0 && ph.week1) ? ph.week1 : ph.template;
      weeks.push({
        wn: wn++, phase: pi, dateRange: fmtRange(ws),
        sessions: tpl.map((s, si) => ({ ...s, id: "w"+(wn-1)+"-s"+si, done: false, skipped: false, rescheduled: false })),
      });
    }
  });
  return weeks;
}

let state = { weeks: buildWeeks(), cw: 0, exp: null, menu: null };

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return;
    const saved = JSON.parse(raw);
    if (saved.cw != null) state.cw = saved.cw;
    if (saved.sessions && saved.sessions.length === state.weeks.length) {
      state.weeks.forEach((w, wi) => {
        w.sessions.forEach((s, si) => {
          const sv = saved.sessions[wi]?.[si];
          if (sv) {
            s.done = sv.done || false;
            s.skipped = sv.skipped || false;
            s.rescheduled = sv.rescheduled || false;
            if (sv.rescheduled) {
              s.label = sv.label || s.label;
              s.type = sv.type || s.type;
              s.ex = sv.ex || s.ex;
              s.detail = sv.detail || s.detail;
              s.dur = sv.dur != null ? sv.dur : s.dur;
              s.slot = sv.slot || s.slot;
            }
          }
        });
      });
    }
  } catch(e) {}
}

function saveState() {
  try {
    const data = {
      cw: state.cw,
      sessions: state.weeks.map(w => w.sessions.map(s => ({
        done: s.done, skipped: s.skipped, rescheduled: s.rescheduled,
        ...(s.rescheduled ? { label: s.label, type: s.type, ex: s.ex, detail: s.detail, dur: s.dur, slot: s.slot } : {}),
      }))),
    };
    localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
  } catch(e) {}
}

function dispatch(action) {
  const w = state.weeks[state.cw];
  switch(action) {
    case "prev": state.cw = Math.max(0, state.cw - 1); state.exp = null; state.menu = null; break;
    case "next": state.cw = Math.min(state.weeks.length - 1, state.cw + 1); state.exp = null; state.menu = null; break;
    default:
      if (action.startsWith("week:")) { state.cw = +action.split(":")[1]; state.exp = null; state.menu = null; }
      else if (action.startsWith("exp:")) { const i = +action.split(":")[1]; state.exp = state.exp === i ? null : i; state.menu = null; }
      else if (action.startsWith("done:")) { const i = +action.split(":")[1]; const s = w.sessions[i]; s.done = !s.done; s.skipped = false; }
      else if (action.startsWith("menu:")) { const i = +action.split(":")[1]; state.menu = state.menu === i ? null : i; }
      else if (action.startsWith("skip:")) {
        const i = +action.split(":")[1]; const src = w.sessions[i];
        src.skipped = true; src.done = false;
        const ri = w.sessions.findIndex((s,j) => j > i && s.type === "rest" && !s.done && !s.skipped);
        if (ri !== -1) {
          const r = w.sessions[ri];
          r.type = src.type; r.label = src.label + " ↻"; r.ex = src.ex;
          r.detail = src.detail; r.dur = src.dur; r.slot = "soir"; r.rescheduled = true;
        }
        state.menu = null;
      }
      else if (action === "reset") {
        if (confirm("Remettre toute la progression à zéro ?")) {
          localStorage.removeItem(STORAGE_KEY);
          state = { weeks: buildWeeks(), cw: 0, exp: null, menu: null };
        }
      }
  }
  saveState();
  render();
}

/* ═══════════════ RENDER ═══════════════ */
function h(tag, attrs, ...children) {
  const el = document.createElement(tag);
  if (attrs) Object.entries(attrs).forEach(([k,v]) => {
    if (k === "style" && typeof v === "object") Object.assign(el.style, v);
    else if (k.startsWith("on")) el.addEventListener(k.slice(2).toLowerCase(), v);
    else el.setAttribute(k, v);
  });
  children.flat(9).forEach(c => {
    if (c == null) return;
    el.appendChild(typeof c === "string" ? document.createTextNode(c) : c);
  });
  return el;
}

function renderExList(ek) {
  const list = EX[ek];
  if (!list) return null;
  return h("div", { class: "ex-list" },
    ...list.map(e => h("div", { class: "ex-item" },
      h("div", { style: { flex: 1 } },
        h("div", { class: "ex-name" }, e.name),
        h("div", { class: "ex-notes" }, e.notes),
      ),
      h("div", { style: { textAlign: "right", flexShrink: 0 } },
        h("div", { class: "ex-sets" }, e.sets),
        h("div", { class: "ex-rest" }, "repos " + e.rest),
      ),
    )),
    h("div", { class: "ex-footer" }, ek === "core" ? "🏠 À la maison · aucun matériel" : "📍 Basic-Fit · haltères + machines"),
  );
}

function renderCard(s, i) {
  const tc = TC[s.type] || TC.rest;

  if (s.type === "prep") {
    return h("div", { class: "prep-card" },
      h("div", { style: { display: "flex", alignItems: "center", gap: "8px" } },
        h("span", { style: { fontSize: "18px" } }, "🤖"),
        h("div", null,
          h("div", { style: { fontSize: "10px", color: "#95A5A6", fontWeight: 600 } }, s.day),
          h("div", { class: "card-label", style: { color: "#95A5A6" } }, s.label),
          h("div", { style: { fontSize: "11px", color: "#BDC3C7", marginTop: "2px" } }, s.detail),
        ),
      ),
    );
  }

  const card = h("div", {
    class: "card" + (s.done ? " done" : "") + (s.skipped ? " skipped" : ""),
    style: { background: s.done ? "#F0FFF4" : tc.bg, border: "1.5px solid " + (s.done ? "#27AE60" : state.exp === i ? tc.accent : "#EBEBEB") },
  });

  if (s.rescheduled) card.appendChild(h("div", { class: "card-rescheduled" }, "↻ Reporté ici"));

  const main = h("div", { class: "card-main", onClick: () => dispatch("exp:" + i) });

  const cb = h("div", {
    class: "checkbox" + (s.done ? " checked" : ""),
    onClick: (e) => { e.stopPropagation(); if (!s.skipped && s.type !== "rest") dispatch("done:" + i); },
  });
  if (s.done) cb.appendChild(h("span", { class: "checkbox-mark" }, "✓"));
  main.appendChild(cb);

  const info = h("div", { class: "card-info" });
  const meta = h("div", { class: "card-meta" });
  meta.appendChild(h("span", { class: "card-day" }, s.day));
  if (SL[s.slot]) meta.appendChild(h("span", { class: "card-slot" }, SL[s.slot]));
  meta.appendChild(h("span", { class: "card-tag", style: { background: tc.accent + "1A", color: tc.accent } }, tc.tag));
  info.appendChild(meta);
  info.appendChild(h("div", { class: "card-label" + (s.skipped ? " strike" : ""), style: { color: s.skipped ? "#BDC3C7" : "#2C3E50" } }, tc.icon + " " + s.label));
  main.appendChild(info);

  if (s.dur > 0) main.appendChild(h("div", { class: "card-dur", style: { background: tc.accent + "15", color: tc.accent } }, s.dur + "′"));
  card.appendChild(main);

  if (state.exp === i) {
    const detail = h("div", { class: "card-detail" });
    if (s.detail) detail.appendChild(h("p", null, s.detail));
    if (s.ex) detail.appendChild(renderExList(s.ex));
    if (!s.done && !s.skipped && s.type !== "rest") {
      const actions = h("div", { class: "actions" });
      actions.appendChild(h("button", { class: "btn-done", onClick: (e) => { e.stopPropagation(); dispatch("done:" + i); } }, "✓ Validé"));
      if (state.menu === i) {
        actions.appendChild(h("button", { class: "btn-confirm", onClick: (e) => { e.stopPropagation(); dispatch("skip:" + i); } }, "Confirmer"));
        actions.appendChild(h("button", { class: "btn-skip", onClick: (e) => { e.stopPropagation(); dispatch("menu:" + i); } }, "Retour"));
      } else {
        actions.appendChild(h("button", { class: "btn-skip", onClick: (e) => { e.stopPropagation(); dispatch("menu:" + i); } }, "↻ Reporter"));
      }
      detail.appendChild(actions);
    }
    card.appendChild(detail);
  }
  return card;
}

function render() {
  const w = state.weeks[state.cw];
  const ph = PHASES[w.phase];
  const dW = w.sessions.filter(s => s.done).length;
  const aW = w.sessions.filter(s => !["rest","prep"].includes(s.type)).length;
  const dAll = state.weeks.reduce((a, w2) => a + w2.sessions.filter(s => s.done).length, 0);
  const aAll = state.weeks.reduce((a, w2) => a + w2.sessions.filter(s => !["rest","prep"].includes(s.type)).length, 0);
  const dtr = Math.max(0, Math.ceil((RACE - new Date()) / 86400000));

  const root = document.getElementById("app");
  root.innerHTML = "";

  // Header
  const header = h("div", { class: "header", style: { background: "linear-gradient(135deg, " + ph.color + "E8, " + ph.color + "99)" } },
    h("div", { class: "header-circle" }),
    h("div", { class: "header-top" },
      h("div", null,
        h("div", { class: "header-label" }, "Hybrid Trainer · PPL + Running"),
        h("div", { class: "header-title" }, ph.name),
      ),
      h("div", { class: "countdown" },
        h("div", { class: "countdown-num" }, "J-" + dtr),
        h("div", { class: "countdown-sub" }, "27 sept 2026"),
      ),
    ),
    h("p", { class: "header-desc" }, ph.desc),
    h("div", null,
      h("div", { class: "progress-label" }, h("span", null, "Progression"), h("span", null, dAll + "/" + aAll)),
      h("div", { class: "progress-bar" }, h("div", { class: "progress-fill", style: { width: (aAll ? (dAll/aAll)*100 : 0) + "%" } })),
    ),
  );
  root.appendChild(header);

  // Week nav
  const nav = h("div", { class: "week-nav" },
    h("button", { class: "week-btn", onClick: () => dispatch("prev"), disabled: state.cw === 0 }, "←"),
    h("div", { style: { textAlign: "center" } },
      h("div", { class: "week-title" }, "Semaine " + w.wn),
      h("div", { class: "week-date" }, w.dateRange),
      h("div", { class: "week-count" }, dW + "/" + aW + " séances"),
    ),
    h("button", { class: "week-btn", onClick: () => dispatch("next"), disabled: state.cw === state.weeks.length - 1 }, "→"),
  );
  root.appendChild(nav);

  // Week bar
  root.appendChild(h("div", { class: "week-bar" },
    h("div", { class: "week-bar-track" },
      h("div", { class: "week-bar-fill", style: { width: (aW ? (dW/aW)*100 : 0) + "%", background: ph.color } }),
    ),
  ));

  // Phase pills
  const pills = h("div", { class: "phase-pills" });
  let sw = 0;
  PHASES.forEach((p, i) => {
    const startW = sw;
    const endW = sw + p.nWeeks - 1;
    const on = state.cw >= startW && state.cw <= endW;
    pills.appendChild(h("button", {
      class: "phase-pill",
      style: { background: on ? p.color : "#ECF0F1", color: on ? "#fff" : "#7F8C8D" },
      onClick: () => dispatch("week:" + startW),
    }, p.name));
    sw += p.nWeeks;
  });
  root.appendChild(pills);

  // Sessions grouped by day
  const dayOrd = ["Lun","Mar","Mer","Jeu","Ven","Sam","Dim"];
  const groups = {};
  w.sessions.forEach((s, si) => { if (!groups[s.day]) groups[s.day] = []; groups[s.day].push({ s, i: si }); });

  const sessionsDiv = h("div", { class: "sessions" });
  dayOrd.forEach(day => {
    const g = groups[day];
    if (!g) return;
    const real = g.filter(x => !["rest","prep"].includes(x.s.type));
    const dbl = real.length > 1;
    const dayDiv = h("div", { style: { marginBottom: "4px" } });
    if (dbl) dayDiv.appendChild(h("div", { class: "day-label" }, day, " ", h("span", { class: "double-badge" }, "DOUBLÉ")));
    const grp = h("div", { class: "day-group" });
    g.forEach(x => grp.appendChild(renderCard(x.s, x.i)));
    dayDiv.appendChild(grp);
    sessionsDiv.appendChild(dayDiv);
  });
  root.appendChild(sessionsDiv);

  // Tips
  const tips = {
    "0-1": "Semaine 1 spéciale : on démarre mardi ! Le lundi c'était la conception du programme. À partir de S2, le lundi sera actif.",
    "0": "2 courses + PPL + gainage. L'objectif c'est la régularité, pas la vitesse. Si tu sens tibias ou genoux, ralentis.",
    "1": "Doublé lundi = footing technique matin + Push soir. 6-8h d'écart.",
    "2": "Le fractionné du mercredi soir est la séance clé. Respecte l'échauffement de 15min. Le footing du lundi matin doit rester LENT.",
    "3": "5:40/km doit devenir naturel. 2 Full Body/sem suffisent à garder ta force.",
    "4": "Rien de nouveau le jour J. Pars lent (5:50 les 5 premiers km). Tu as fait le boulot. 🏁",
  };
  const tipKey = (w.phase === 0 && w.wn === 1) ? "0-1" : "" + w.phase;
  if (tips[tipKey]) {
    root.appendChild(h("div", { class: "tip", style: { background: ph.color + "0D", borderLeft: "3px solid " + ph.color } }, "⚡ " + tips[tipKey]));
  }

  // Footer
  root.appendChild(h("p", { class: "footer" },
    "14 avril → 27 septembre 2026 · 23 semaines", h("br"),
    "Basic-Fit · haltères + machines · pas de barre", h("br"),
    "Programme conçu par Bastien × Claude",
  ));

  root.appendChild(h("div", { class: "save-row" },
    h("div", { style: { fontSize: "10px", color: "#27AE60", display: "flex", alignItems: "center", gap: "4px" } },
      h("span", { class: "save-dot", style: { background: "#27AE60" } }),
      "Progression sauvegardée",
    ),
    h("button", { class: "btn-reset", onClick: () => dispatch("reset") }, "Réinitialiser"),
  ));
}

/* ═══════════════ INIT ═══════════════ */
loadState();
render();
</script>
</body>
</html>
